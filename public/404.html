<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect for GitHub Pages
    var path = window.location.pathname;
    var repo = '/cybernetic-sai-portfolio';
    if (path.startsWith(repo)) {
      var route = path.slice(repo.length);
      window.location.replace(repo + '/?route=' + encodeURIComponent(route));
    }
  </script>
</head>
<body></body>
</html>
